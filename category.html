<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <title>Kategorija</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <h1 class="logo">Lost & Found</h1>
            </div>
            <div class="nav-right">
                <button class="btn" id="login-btn">Prisijungti</button>
                <button class="btn" id="register-btn">Registruotis</button>
                <button class="btn" id="post-ad-btn">Ikelti Skelbima</button>
            </div>
        </nav>
    </header>
      <div class="categories">
        <h1>Kategorijos</h1>
    <div class="category-list">
        <a class="category-item" href="index.html">
            <img src="assets/icons/icons8-home.svg" alt="Pradžia">
            <h3>Pradžia</h3>
        </a>
        <a class="category-item" href="category.html?type=elektronika">
            <img src="assets/icons/icons8-electronics-94.png" alt="Elektronika">
            <h3>Elektronika</h3>
        </a>
        <a class="category-item" href="category.html?type=apranga">
            <img src="assets/icons/icons8-clothes-94.png" alt="Apranga">
            <h3>Apranga</h3>
        </a>
        <a class="category-item" href="category.html?type=raktai">
            <img src="assets/icons/icons8-bunch-of-keys-94.png" alt="Raktai">
            <h3>Raktai</h3>
        </a>
        <a class="category-item" href="category.html?type=dokumentai">
            <img src="assets/icons/icons8-card-wallet-94.png" alt="Dokumentai">
            <h3>Dokumentai</h3>
        </a>
        <a class="category-item" href="category.html?type=visi">
            <img src="assets/icons/icons8-open-box-94.png" alt="Visi">
            <h3>Visi</h3>
        </a>
    </div>
  </div>
    <main>
        <section class="ads">
            <h1 id="category-title">Kategorija</h1>
            <div class="ads-list" id="ads-list"></div>
        </section>
    </main>
</body>
<script src="js/category.js"></script>
<script src="js/main.js"></script>
</html>
