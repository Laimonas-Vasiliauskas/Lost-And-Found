<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <title>Lost & Found</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<header>
  <nav>
    <div>
      <h1 class="logo">Lost & Found</h1>
    </div>
    <div>
      <button class="btn" id="register-btn">Registruotis</button>
    </div>
  </nav>
</header>
<body>
  <div class="hero hero-form">
    <form id="login-form">
        <div>
            <h2>Prisijungti</h2>
            <p>El. paštas:</p>
            <input type="email" placeholder="El. paštas" id="email" required><br>
            <p>Slaptažodis:</p>
            <input type="password" placeholder="Slaptažodis" id="password" required><br>
            <button type="button" id="form-login-btn">Prisijungti</button>
        </div>
    </form>
  </div>
</body>
<script src="js/main.js"></script>
</html>
