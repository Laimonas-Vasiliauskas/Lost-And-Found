<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <title>Profilis</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <nav>
    <div class="nav-left">
      <h1 class="logo">Lost & Found</h1>
    </div>
    <div class="nav-right">
        <img src="assets/icons/icons8-customer-50.png" alt="Profilis">
        <button class="btn" id="logout-btn">Atsijungti</button>
    </div>
  </nav>
</header>

<main>
  <section class="profile">
    <h1>Mano profilis</h1>

    <div class="profile-info">
      <p><strong>Vardas:</strong> <span id="user-name">Jonas</span></p>
      <p><strong>El. paštas:</strong> <span id="user-email">jonas@email.com</span></p>
      <button class="btn" id="edit-profile-btn">Redaguoti profilį</button>
    </div>
  </section>

  <section class="profile-ads">
    <h1>Mano skelbimai</h1>
  

  </section>
</main>

<script src="js/profile.js"></script>
<script src="js/main.js"></script>

</body>
</html>
